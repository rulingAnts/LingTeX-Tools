name: Build Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload artifacts to (e.g. v0.3.1)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync core.js into tauri/src/
        shell: bash
        run: cp docs/core.js tauri/src/core.js

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' tauri/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json tauri/src-tauri/tauri.conf.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Build Windows desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: tauri

      - name: Upload Windows artifacts to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXE=$(find tauri/src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          MSI=$(find tauri/src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          cp "$EXE" lingtex-tools-windows-setup.exe
          cp "$MSI" lingtex-tools-windows.msi
          gh release upload ${{ inputs.tag }} \
            lingtex-tools-windows-setup.exe \
            lingtex-tools-windows.msi \
            --clobber
