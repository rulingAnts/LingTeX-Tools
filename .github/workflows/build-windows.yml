name: Build Windows (pre-release)

on:
  workflow_dispatch:
    inputs:
      label:
        description: 'Version label appended to tag (e.g. beta.1)'
        required: false
        default: 'dev'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync core.js into tauri/src/
        shell: bash
        run: cp docs/core.js tauri/src/core.js

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workingDirectory: tauri/src-tauri

      - name: Build and publish pre-release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tagName:      pre-win-${{ github.run_number }}-${{ inputs.label }}
          releaseName:  'LingTeX Tools — Windows pre-release #${{ github.run_number }}'
          releaseBody:  |
            Windows pre-release build — **not for production use**.

            Triggered manually from branch `${{ github.ref_name }}`.
          releaseDraft: false
          prerelease:   true
