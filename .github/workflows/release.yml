name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

# Required to create the GitHub release and upload assets
permissions:
  contents: write

jobs:

  # ── 1. Create the draft release ────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          name: 'LingTeX Tools ${{ github.ref_name }}'
          draft: true
          generate_release_notes: true
          body: |
            ## Installation

            > **⚠️ Linux builds are untested.** The developer does not have a Linux machine.
            > The `.deb` and `.AppImage` artifacts are provided on a best-effort basis.
            > If you try them and run into issues — or get them working — please
            > [open an issue or PR](https://github.com/rulingAnts/LingTeX-Tools/issues).
            > Linux contributions are very welcome.

            ---

            ### 🖥 Desktop App (macOS / Windows / Linux)

            Download the installer for your platform from the assets below.

            **macOS — required first-launch steps (app is unsigned):**

            1. After installing, right-click `LingTeX Tools.app` → **Open**, then click **Open** again in the security dialog.
               Or run once in Terminal:
               ```
               xattr -cr "/Applications/LingTeX Tools.app"
               ```
            2. When prompted, grant **Accessibility** access in
               **System Settings → Privacy & Security → Accessibility**.
               This is required for global keyboard shortcuts and Auto re-copy to work.

            ---

            ### ⬡ Browser Extension (Chrome / Firefox)

            The extension is not yet in the browser stores — manual install is required.

            **Chrome / Edge:**
            1. Download `lingtex-tools-chrome.zip` and unzip it somewhere permanent
               (Chrome loads directly from this folder — don't delete it)
            2. Go to `chrome://extensions`, enable **Developer mode**, click **Load unpacked**,
               and select the unzipped folder
            3. Pin the LingTeX Tools icon from the puzzle-piece menu

            **Firefox:**
            1. Download `lingtex-tools-firefox.xpi`
            2. Open the file (or drag it onto a Firefox tab) and click **Add** when prompted
            > The extension is permanently installed — no repeat after restart.

            ---

  # ── 2. Browser extensions (macOS runner — required for Safari / Xcode) ─────
  extensions:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' extension/chrome/manifest.json > tmp.json && mv tmp.json extension/chrome/manifest.json
          jq --arg v "$VERSION" '.version = $v' extension/firefox/manifest.json > tmp.json && mv tmp.json extension/firefox/manifest.json

      - name: Build Chrome + Firefox extensions
        run: bash extension/build.sh --zip
        # produces extension/lingtex-tools-chrome.zip
        #          extension/lingtex-tools-firefox.zip

      # Upload Chrome + Firefox zips immediately — before signing or Safari,
      # so these are guaranteed in the release even if later steps fail.
      - name: Upload Chrome + Firefox artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            extension/lingtex-tools-chrome.zip \
            extension/lingtex-tools-firefox.zip

      - name: Sign Firefox extension (AMO unlisted)
        continue-on-error: true
        id: firefox-sign
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npm install -g web-ext
          web-ext sign \
            --channel=unlisted \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --source-dir=extension/firefox \
            --artifacts-dir=extension/signed
          # Rename to a predictable filename
          XPI=$(find extension/signed -name "*.xpi" | head -1)
          if [ -n "$XPI" ]; then
            mv "$XPI" extension/lingtex-tools-firefox.xpi
          else
            echo "ERROR: no .xpi found after signing"
            exit 1
          fi

      - name: Upload signed Firefox .xpi
        if: steps.firefox-sign.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            extension/lingtex-tools-firefox.xpi

      - name: Convert Chrome extension → Safari Xcode project
        continue-on-error: true
        id: safari-convert
        run: |
          xcrun safari-web-extension-converter \
            extension/chrome \
            --project-location extension/safari \
            --app-name "LingTeX Tools" \
            --bundle-identifier com.rulingants.lingtex-tools \
            --macos-only \
            --force \
            --no-open

      - name: Build Safari app (unsigned)
        if: steps.safari-convert.outcome == 'success'
        continue-on-error: true
        id: safari-build
        run: |
          xcodebuild \
            -project "extension/safari/LingTeX Tools/LingTeX Tools.xcodeproj" \
            -scheme "LingTeX Tools (macOS)" \
            -configuration Release \
            -derivedDataPath extension/safari/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Safari app
        if: steps.safari-build.outcome == 'success'
        continue-on-error: true
        id: safari-package
        run: |
          APP="extension/safari/build/Build/Products/Release/LingTeX Tools.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: Safari app bundle not found at: $APP"
            find extension/safari/build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          cd "extension/safari/build/Build/Products/Release"
          zip -r "$GITHUB_WORKSPACE/extension/lingtex-tools-safari.zip" \
            "LingTeX Tools.app" --exclude "*.DS_Store"

      - name: Upload Safari artifact
        if: steps.safari-package.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            extension/lingtex-tools-safari.zip

  # ── 3. Desktop app — macOS ─────────────────────────────────────────────────
  desktop-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync core.js into tauri/src/
        run: cp docs/core.js tauri/src/core.js

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' tauri/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json tauri/src-tauri/tauri.conf.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Build macOS desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: tauri

      - name: Upload macOS artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find tauri/src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" lingtex-tools-macos.dmg
          gh release upload ${{ github.ref_name }} lingtex-tools-macos.dmg

  # ── 4. Desktop app — Windows ───────────────────────────────────────────────
  desktop-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync core.js into tauri/src/
        run: cp docs/core.js tauri/src/core.js

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' tauri/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json tauri/src-tauri/tauri.conf.json

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Build Windows desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: tauri

      - name: Upload Windows artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXE=$(find tauri/src-tauri/target/release/bundle/nsis -name "*-setup.exe" | head -1)
          MSI=$(find tauri/src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          cp "$EXE" lingtex-tools-windows-setup.exe
          cp "$MSI" lingtex-tools-windows.msi
          gh release upload ${{ github.ref_name }} lingtex-tools-windows-setup.exe lingtex-tools-windows.msi

  # ── 5. Desktop app — Linux ─────────────────────────────────────────────────
  # Linux is community-maintained and has not been tested by the developer.
  # continue-on-error ensures a Linux build failure does not block the release.
  desktop-linux:
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync core.js into tauri/src/
        run: cp docs/core.js tauri/src/core.js

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          jq --arg v "$VERSION" '.version = $v' tauri/src-tauri/tauri.conf.json > tmp.json
          mv tmp.json tauri/src-tauri/tauri.conf.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Build Linux desktop app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: tauri

      - name: Upload Linux artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEB=$(find tauri/src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          APPIMAGE=$(find tauri/src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$DEB" lingtex-tools-linux.deb
          cp "$APPIMAGE" lingtex-tools-linux.AppImage
          gh release upload ${{ github.ref_name }} lingtex-tools-linux.deb lingtex-tools-linux.AppImage

  # ── 6. Publish (un-draft) the release ─────────────────────────────────────
  publish-release:
    needs: [extensions, desktop-macos, desktop-windows, desktop-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}
